backend:
  replicas: 2
  image:
    repo: ghcr.io/saidalhendi/backend
    tag: v0.0.1

imagePullSecrets:
  name: regcred
  

frontend:
  apiUrl: https://said.praxis-form.de
  replicas: 2
  image:
    repo: ghcr.io/saidalhendi/frontend
    tag: v1


grafana:
  enabled: true
  ingress:
    enabled: true
    ingressClassName: nginx
    # Values can be templated
    annotations:
      nginx.ingress.kubernetes.io/ssl-redirect: 'false'
      nginx.ingress.kubernetes.io/force-ssl-redirect: 'false'
    path: /
    pathType: Prefix
    hosts:
      - grafana.praxis-form.de
    tls:
      - secretName: grafana-praxis-form-tls
        hosts:
          - grafana.praxis-form.de
